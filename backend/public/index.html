<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Xavier Online 2027</title>

  <link rel="stylesheet" href="css/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="hero">
    <div class="overlay"></div>

    <div class="conteudo centro-index">
      <div class="logo-x">X</div>

      <h1>Xavier Online</h1>

      <p>
        Canal Oficial de Atendimento do Gabinete
        do Vereador Eduardo Xavier
      </p>

      <div class="botoes">

        <a href="/nova-demanda.html" class="btn-principal">
          Registrar Solicitação
        </a>

        <button class="btn-secundario" onclick="abrirLoginTransparencia()">
          Painel de Transparência
        </button>

      </div>
    </div>
  </div>


  <div id="modalLogin" class="modal-login">

    <div class="login-box">
      <button class="fechar-login" onclick="fecharLoginTransparencia()">✕</button>

      <h2>Painel de Transparência</h2>
      <p>Acesse com CPF e senha cadastrados.</p>

      <label for="loginCpf">CPF</label>
      <input type="text" id="loginCpf" maxlength="14" placeholder="000.000.000-00" autocomplete="username" required oninput="formatarCPF(this)" onkeydown="entrarComEnter(event)">

      <label for="loginSenha">Senha</label>
      <input type="password" id="loginSenha" placeholder="Digite sua senha" autocomplete="current-password" onkeydown="entrarComEnter(event)">

      <button class="btn-login" onclick="validarLoginTransparencia()">
        Entrar
      </button>

      <small id="erroLogin"></small>
    </div>

  </div>

  <script>
    function abrirLoginTransparencia() {
      document.getElementById("modalLogin").style.display = "flex";

      setTimeout(() => {
        document.getElementById("loginCpf").focus();
      }, 100);
    }

    function fecharLoginTransparencia() {
      document.getElementById("modalLogin").style.display = "none";
      document.getElementById("erroLogin").innerText = "";
      document.getElementById("loginCpf").value = "";
      document.getElementById("loginSenha").value = "";
    }

    function entrarComEnter(event) {
      if (event.key === "Enter") {
        validarLoginTransparencia();
      }
    }

    function limparCPF(valor) {
      return String(valor || "").replace(/\D/g, "");
    }

    function formatarCPF(input) {
      let valor = limparCPF(input.value).slice(0, 11);

      valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
      valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
      valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

      input.value = valor;
    }

    function cpfTemOnzeNumeros(cpf) {
      return limparCPF(cpf).length === 11;
    }

    function redirecionarPorPerfil(perfil) {
      const perfilNormalizado = String(perfil || "").toUpperCase();

      if (perfilNormalizado === "ADMIN") {
        window.location.href = "dashboard.html";
        return;
      }

      if (perfilNormalizado === "ASSESSOR") {
        window.location.href = "dashboard.html";
        return;
      }

      if (perfilNormalizado === "LIDERANCA") {
        window.location.href = "mapa.html";
        return;
      }

      if (perfilNormalizado === "CONSULTA") {
        window.location.href = "dashboard.html";
        return;
      }

      window.location.href = "dashboard.html";
    }

    async function validarLoginTransparencia() {
      const cpf = document.getElementById("loginCpf").value.trim();
      const senha = document.getElementById("loginSenha").value.trim();
      const erro = document.getElementById("erroLogin");

      erro.innerText = "";

      if (!cpf || !senha) {
        erro.innerText = "Informe CPF e senha.";
        return;
      }

      if (!cpfTemOnzeNumeros(cpf)) {
        erro.innerText = "CPF inválido. Informe 11 números.";
        return;
      }

      try {
        const resposta = await fetch("/api/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "include",
          body: JSON.stringify({
            cpf: limparCPF(cpf),
            senha: senha
          })
        });

        const dados = await resposta.json();

        if (!resposta.ok || !dados.ok) {
          erro.innerText = dados.mensagem || "CPF ou senha inválidos.";
          return;
        }

        localStorage.setItem("usuario", JSON.stringify(dados.usuario));

        redirecionarPorPerfil(dados.usuario.perfil);

      } catch (e) {
        console.error(e);
        erro.innerText = "Erro ao conectar com o servidor.";
      }
    }

    async function verificarSessaoAtiva() {
      try {
        const resposta = await fetch("/api/auth/me", {
          method: "GET",
          credentials: "include"
        });

        const dados = await resposta.json();

        if (resposta.ok && dados.ok && dados.usuario) {
          localStorage.setItem("usuario", JSON.stringify(dados.usuario));
          redirecionarPorPerfil(dados.usuario.perfil);
        }

      } catch (erro) {
        localStorage.removeItem("usuario");
      }
    }

    verificarSessaoAtiva();
  </script>

  <script src="js/app.js"></script>

</body>

</html>
