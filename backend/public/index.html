<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Xavier Online 2027</title>

  <link rel="stylesheet" href="css/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="hero">
    <div class="overlay"></div>

    <div class="conteudo centro-index">
      <div class="logo-x">X</div>

      <h1>Xavier Online</h1>

      <p>
        Canal Oficial de Atendimento do Gabinete
        do Vereador Eduardo Xavier
      </p>

      <div class="botoes">
        <a href="cadastro.html" class="btn-principal">
          Registrar Solicitação
        </a>

        <button class="btn-secundario" onclick="abrirLoginTransparencia()">
          Painel de Transparência
        </button>
      </div>
    </div>
  </div>

  <div id="modalLogin" class="modal-login">
    <div class="login-box">
      <button class="fechar-login" onclick="fecharLoginTransparencia()">✕</button>

      <h2>Painel de Transparência</h2>
      <p>Acesse com CPF e senha cadastrados.</p>

      <label for="loginCpf">CPF</label>
      <input type="text" id="loginCpf" maxlength="14" placeholder="000.000.000-00" required oninput="formatarCPF(this)">

      <label for="loginSenha">Senha</label>
      <input type="password" id="loginSenha" placeholder="Digite sua senha">

      <button class="btn-login" onclick="validarLoginTransparencia()">
        Entrar
      </button>

      <small id="erroLogin"></small>
    </div>
  </div>

  <script>
    function abrirLoginTransparencia() {
      document.getElementById("modalLogin").style.display = "flex";
    }

    function fecharLoginTransparencia() {
      document.getElementById("modalLogin").style.display = "none";
      document.getElementById("erroLogin").innerText = "";
    }

    function formatarCPF(input) {
      let valor = input.value.replace(/\D/g, "");

      valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
      valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
      valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

      input.value = valor;
    }

    function validarCPF(cpf) {
      cpf = cpf.replace(/\D/g, "");

      if (cpf.length !== 11) return false;
      if (/^(\d)\1+$/.test(cpf)) return false;

      let soma = 0;

      for (let i = 0; i < 9; i++) {
        soma += Number(cpf[i]) * (10 - i);
      }

      let resto = (soma * 10) % 11;
      if (resto === 10) resto = 0;

      if (resto !== Number(cpf[9])) return false;

      soma = 0;

      for (let i = 0; i < 10; i++) {
        soma += Number(cpf[i]) * (11 - i);
      }

      resto = (soma * 10) % 11;
      if (resto === 10) resto = 0;

      return resto === Number(cpf[10]);
    }

    function validarLoginTransparencia() {
      const cpf = document.getElementById("loginCpf").value.trim();
      const senha = document.getElementById("loginSenha").value.trim();
      const erro = document.getElementById("erroLogin");

      if (!cpf || !senha) {
        erro.innerText = "Informe CPF e senha.";
        return;
      }

      if (!validarCPF(cpf)) {
        erro.innerText = "CPF inválido.";
        return;
      }

      if (cpf === "32531851844" && senha === "ERX2026") {
        localStorage.setItem("usuarioLogado", "true");
        window.location.href = "dashboard.html";
      } else {
        erro.innerText = "CPF ou senha inválidos.";
      }
    }
  </script>

  <script src="js/app.js"></script>
 v 
</body>

</html>
