<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Relatório Legislativo | Xavier Online</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #06111f;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    .topo {
      height: 70px;
      background: #071729;
      border-bottom: 1px solid rgba(255, 255, 255, .08);

      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 0 25px;
    }

    .topo h1 {
      font-size: 22px;
    }

    .topo span {
      color: #94a3b8;
      font-size: 13px;
    }

    .acoes {
      display: flex;
      gap: 12px;
    }

    .btn {
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .btn-dashboard {
      background: #2563eb;
      color: white;
    }

    .btn-powerbi {
      background: #16a34a;
      color: white;
    }

    .conteudo {
      height: calc(100vh - 70px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
  </style>

</head>

<body>

  <header class="topo">

    <div>
      <h1>📊 Relatório Legislativo</h1>
      <span>Gabinete Vereador Eduardo Xavier</span>
    </div>

    <div class="acoes">

      <a href="dashboard.html" class="btn btn-dashboard">
        Dashboard
      </a>

      <a href="https://app.powerbi.com/view?r=eyJrIjoiMDgwN2QxN2QtNjU4YS00YWVhLWJkYzUtMzgyYjQzZjNlNWNiIiwidCI6IjRmN2YzMWM1LWQ4YzAtNDM5My1hYzAxLTllZjMwNTRmMWRiYiJ9" target="_blank" class="btn btn-powerbi">
        Abrir no Power BI
      </a>

    </div>

  </header>

  <main class="conteudo">

    <iframe title="Relatório Legislativo" src="https://app.powerbi.com/view?r=eyJrIjoiMDgwN2QxN2QtNjU4YS00YWVhLWJkYzUtMzgyYjQzZjNlNWNiIiwidCI6IjRmN2YzMWM1LWQ4YzAtNDM5My1hYzAxLTllZjMwNTRmMWRiYiJ9" allowfullscreen>
    </iframe>

  </main>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
